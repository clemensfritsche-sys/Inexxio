name: Deploy → Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  GCP_PROJECT: inexxio-dev
  GCP_REGION: europe-west6
  ARTIFACT_REGISTRY: europe-west6-docker.pkg.dev
  ARTIFACT_REPO: inexxio-dev
  CLOUD_RUN_SERVICE: inexxio-backend-dev
  FIREBASE_PROJECT: inexxio-dev

jobs:
  deploy-backend:
    name: Backend → Cloud Run (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INEXXIO_DEV }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push backend image
        id: build
        working-directory: backend
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/backend:latest"
          docker build --tag "$IMAGE" --tag "$IMAGE_LATEST" \
            --cache-from "$IMAGE_LATEST" --build-arg BUILDKIT_INLINE_CACHE=1 .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --project "${{ env.GCP_PROJECT }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account "cloudrun-backend@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances "${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:inexxio-dev-db" \
            --set-env-vars "APP_ENV=development,GCP_PROJECT=${{ env.GCP_PROJECT }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest" \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60s \
            --concurrency 80 \
            --quiet

  deploy-frontend:
    name: Frontend → Firebase Hosting (dev)
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INEXXIO_DEV }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend (dev config)
        working-directory: frontend
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCl0x8TQUWX5XaECVF2luO9i9PNU8L7CWE
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: inexxio-dev.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: inexxio-dev
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: inexxio-dev.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "395883203074"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:395883203074:web:806fcb48ad21b90c88751b
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-9D74JS9VN8
          NEXT_PUBLIC_API_URL: https://inexxio-dev.web.app
          NEXT_PUBLIC_APP_URL: https://inexxio-dev.web.app
        run: npm run build

      - name: Deploy to Firebase Hosting (dev)
        run: firebase deploy --only hosting --project inexxio-dev --non-interactive

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: failure()
    steps:
      - run: echo "::error::Dev deployment failed for ${{ github.sha }} by ${{ github.actor }}"
